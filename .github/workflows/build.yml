name: CI

on:
  push:
    branches: [main]
    tags: ['[0-9]*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  APPLEID_NAME: "Cal Goheen"
  TEAM_ID: "T32QNTXQNC"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Read product info
        id: product
        shell: pwsh
        run: |
          $productName = Split-Path -Leaf $env:GITHUB_WORKSPACE
          $productVersion = (Get-Content VERSION -Raw).Trim()
          echo "name=$productName" >> $env:GITHUB_OUTPUT
          echo "version=$productVersion" >> $env:GITHUB_OUTPUT

      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [ "$GITHUB_REF_NAME" != "$FILE_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match VERSION file $FILE_VERSION"
            exit 1
          fi

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Stage plugin bundles
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $productName = "${{ steps.product.outputs.name }}"
          $buildProducts = "build\${productName}_artefacts\Release"
          $stagingDir = "build\installer\staging"
          $vst3Dir = "$stagingDir\VST3"
          $clapDir = "$stagingDir\CLAP"
          New-Item -ItemType Directory -Force -Path $vst3Dir, $clapDir | Out-Null
          Copy-Item -Recurse "$buildProducts\VST3\${productName}.vst3" "$vst3Dir\"
          Copy-Item "$buildProducts\CLAP\${productName}.clap" "$clapDir\"
          echo "STAGING_DIR=$PWD\$stagingDir" >> $env:GITHUB_ENV

      - name: Download WebView2 bootstrapper
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $webviewDir = "build\installer\webview2"
          New-Item -ItemType Directory -Force -Path $webviewDir | Out-Null
          $webviewPath = "$PWD\$webviewDir\MicrosoftEdgeWebview2Setup.exe"
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile $webviewPath
          echo "WEBVIEW2_PATH=$webviewPath" >> $env:GITHUB_ENV

      - name: Generate Inno Setup script
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $productName = "${{ steps.product.outputs.name }}"
          $productVersion = "${{ steps.product.outputs.version }}"
          $outputDir = "build\installer\output"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null
          $lines = @(
            "#define ApplicationName `"$productName`""
            "#define VST3Path `"$env:STAGING_DIR\VST3\$productName.vst3`""
            "#define ClapPath `"$env:STAGING_DIR\CLAP\$productName.clap`""
            "#define ApplicationVersion `"$productVersion`""
            "#define WebView2InstallerPath `"$env:WEBVIEW2_PATH`""
            ""
            "[Setup]"
            "AppName={#ApplicationName}"
            "AppVersion={#ApplicationVersion}"
            "DefaultDirName=`"{commoncf64}`""
            "UsePreviousAppDir=no"
            "DefaultGroupName={#ApplicationName}"
            "DirExistsWarning=no"
            "AppendDefaultDirName=no"
            "DisableDirPage=no"
            "OutputDir=$PWD\$outputDir"
            "OutputBaseFilename={#ApplicationName} v{#ApplicationVersion}"
            "Uninstallable=no"
            ""
            "[Files]"
            "Source: {#VST3Path}\*; DestDir: `"{app}\VST3\$productName.vst3`"; Flags: recursesubdirs createallsubdirs"
            "Source: {#ClapPath}; DestDir: `"{app}\CLAP`""
            "Source: {#WebView2InstallerPath}; DestDir: `"{tmp}`"; Flags: deleteafterinstall"
            ""
            "[Run]"
            "Filename: `"{tmp}\MicrosoftEdgeWebview2Setup.exe`"; Parameters: `"/silent /install`"; StatusMsg: `"Installing WebView2 Runtime...`"; Check: not IsWebView2Installed"
            ""
            "[Code]"
            "function IsWebView2Installed: Boolean;"
            "var"
            "  Version: String;"
            "begin"
            "  Result := RegQueryStringValue(HKLM, 'SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}', 'pv', Version);"
            "  if not Result then"
            "    Result := RegQueryStringValue(HKCU, 'SOFTWARE\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}', 'pv', Version);"
            "end;"
          )
          $issPath = "build\installer\installer.iss"
          Set-Content -Path $issPath -Value $lines -Encoding UTF8
          echo "ISS_PATH=$PWD\$issPath" >> $env:GITHUB_ENV

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "$env:ISS_PATH"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compilation failed" }

      - name: Upload installer artifact
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.product.outputs.name }}-installer-windows
          path: build/installer/output/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Read product info
        id: product
        run: |
          PRODUCT_NAME=$(basename "$GITHUB_WORKSPACE")
          PRODUCT_VERSION=$(cat VERSION)
          echo "name=$PRODUCT_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PRODUCT_VERSION" >> "$GITHUB_OUTPUT"
          echo "identifier=com.CalGoheen.$PRODUCT_NAME" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [ "$GITHUB_REF_NAME" != "$FILE_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match VERSION file $FILE_VERSION"
            exit 1
          fi

      - name: Import signing certificates
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_INSTALLER_CERTIFICATE: ${{ secrets.MACOS_INSTALLER_CERTIFICATE }}
          MACOS_INSTALLER_CERTIFICATE_PWD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$MACOS_CERTIFICATE" | base64 --decode > app_cert.p12
          security import app_cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/productbuild
          rm app_cert.p12
          echo "$MACOS_INSTALLER_CERTIFICATE" | base64 --decode > installer_cert.p12
          security import installer_cert.p12 -k build.keychain -P "$MACOS_INSTALLER_CERTIFICATE_PWD" -T /usr/bin/productbuild -T /usr/bin/productsign
          rm installer_cert.p12
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Stage plugin bundles
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: |
          PRODUCT_NAME="${{ steps.product.outputs.name }}"
          BUILD_PRODUCTS="build/${PRODUCT_NAME}_artefacts/Release"
          STAGING_DIR="build/installer/staging"
          VST3_DIR="$STAGING_DIR/Library/Audio/Plug-Ins/VST3"
          COMP_DIR="$STAGING_DIR/Library/Audio/Plug-Ins/Components"
          CLAP_DIR="$STAGING_DIR/Library/Audio/Plug-Ins/CLAP"
          mkdir -p "$VST3_DIR" "$COMP_DIR" "$CLAP_DIR"
          cp -R "$BUILD_PRODUCTS/VST3/${PRODUCT_NAME}.vst3" "$VST3_DIR/"
          cp -R "$BUILD_PRODUCTS/AU/${PRODUCT_NAME}.component" "$COMP_DIR/"
          cp -R "$BUILD_PRODUCTS/CLAP/${PRODUCT_NAME}.clap" "$CLAP_DIR/"
          echo "STAGING_DIR=$PWD/$STAGING_DIR" >> "$GITHUB_ENV"

      - name: Codesign plugins
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: |
          PRODUCT_NAME="${{ steps.product.outputs.name }}"
          APP_SIGN_ID="Developer ID Application: ${APPLEID_NAME} (${TEAM_ID})"
          PLUGINS_DIR="$STAGING_DIR/Library/Audio/Plug-Ins"
          for bundle in \
            "$PLUGINS_DIR/VST3/${PRODUCT_NAME}.vst3" \
            "$PLUGINS_DIR/Components/${PRODUCT_NAME}.component" \
            "$PLUGINS_DIR/CLAP/${PRODUCT_NAME}.clap"
          do
            codesign --force \
              -s "$APP_SIGN_ID" \
              -v \
              --deep \
              --strict \
              --options=runtime \
              --timestamp \
              "$bundle"
          done

      - name: Build installer package
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: |
          PRODUCT_NAME="${{ steps.product.outputs.name }}"
          PRODUCT_VERSION="${{ steps.product.outputs.version }}"
          PRODUCT_IDENTIFIER="${{ steps.product.outputs.identifier }}"
          OUTPUT_DIR="build/installer/output"
          UNSIGNED_PKG="$OUTPUT_DIR/${PRODUCT_NAME}-unsigned.pkg"
          SIGNED_PKG="$OUTPUT_DIR/${PRODUCT_NAME} v${PRODUCT_VERSION}.pkg"
          INSTALLER_SIGN_ID="Developer ID Installer: ${APPLEID_NAME} (${TEAM_ID})"
          mkdir -p "${OUTPUT_DIR}"
          pkgbuild \
            --root "$STAGING_DIR" \
            --identifier "$PRODUCT_IDENTIFIER" \
            --version "$PRODUCT_VERSION" \
            --install-location "/" \
            "$UNSIGNED_PKG"
          productsign --sign "$INSTALLER_SIGN_ID" "$UNSIGNED_PKG" "$SIGNED_PKG"
          rm "$UNSIGNED_PKG"
          echo "SIGNED_PKG=$PWD/$SIGNED_PKG" >> "$GITHUB_ENV"

      - name: Notarize installer
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          APPLEID_EMAIL: ${{ secrets.APPLEID_EMAIL }}
          NOTARIZATION_APP_PASSWORD: ${{ secrets.NOTARIZATION_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "$SIGNED_PKG" \
            --apple-id "$APPLEID_EMAIL" \
            --password "$NOTARIZATION_APP_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait
          xcrun stapler staple "$SIGNED_PKG"
          spctl -vvv --assess --type install "$SIGNED_PKG"

      - name: Upload installer artifact
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.product.outputs.name }}-installer-macos
          path: build/installer/output/*.pkg

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.pkg
